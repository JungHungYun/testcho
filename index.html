
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);color:var(--color-text-primary);font-size:15px}
.wrap{padding:12px 0}
.top-bar{margin-bottom:12px}
.title{font-size:17px;font-weight:500;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 6px;text-align:center}
.stat-val{font-size:18px;font-weight:500;display:block;line-height:1.2}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);display:block;margin-top:2px}
.pbar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;margin-bottom:12px}
.pfill{height:100%;background:#3949AB;border-radius:2px;transition:width .4s}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;min-height:36px;display:flex;align-items:center}
.tab.active{background:#1A237E;color:#fff;border-color:#1A237E}
.ch-label{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
.q-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);padding:14px;margin-bottom:10px}
.q-card.answered{border-color:var(--color-border-secondary)}
.q-top{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start}
.q-badge{font-size:11px;font-weight:500;color:#5C6BC0;background:#E8EAF6;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.q-text{font-size:14px;line-height:1.55;color:var(--color-text-primary)}
.choices{display:flex;flex-direction:column;gap:7px}
.choice{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);cursor:pointer;min-height:48px;transition:background .1s,border-color .1s}
.choice:active:not(.locked){background:var(--color-background-secondary)}
.c-lbl{font-size:12px;font-weight:500;color:var(--color-text-secondary);min-width:18px;flex-shrink:0;margin-top:1px}
.c-txt{font-size:13px;line-height:1.5;color:var(--color-text-primary)}
.choice.correct{background:#E8F5E9;border-color:#2E7D32}
.choice.correct .c-lbl{color:#2E7D32}
.choice.correct .c-txt{color:#1B5E20;font-weight:500}
.choice.wrong{background:#FFEBEE;border-color:#C62828}
.choice.wrong .c-lbl{color:#C62828}
.choice.wrong .c-txt{color:#B71C1C}
.choice.dim{opacity:.4}
.explain{margin-top:10px;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border-left:3px solid #3949AB;font-size:12.5px;line-height:1.6;color:var(--color-text-secondary);display:none}
.explain b{color:#1A237E;font-weight:500}
.chap-wrap{display:none}
.chap-wrap.active{display:block}
.score-banner{display:none;padding:20px 16px;border-radius:var(--border-radius-lg);background:var(--color-background-secondary);text-align:center;margin-bottom:12px}
.score-banner.on{display:block}
.score-big{font-size:40px;font-weight:500;color:#1A237E;line-height:1.1;margin-bottom:4px}
.score-sub{font-size:14px;color:var(--color-text-secondary);margin-bottom:14px;line-height:1.5}
.reset-btn{padding:10px 24px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:14px;cursor:pointer;min-height:44px}
</style>

<div class="wrap">
  <div class="top-bar">
    <div class="title">심리학 객관식 문제집</div>
    <div class="stats">
      <div class="stat"><span class="stat-val" id="s-done">0</span><span class="stat-lbl">푼 문제</span></div>
      <div class="stat"><span class="stat-val" style="color:#2E7D32" id="s-cor">0</span><span class="stat-lbl">정답</span></div>
      <div class="stat"><span class="stat-val" style="color:#C62828" id="s-wro">0</span><span class="stat-lbl">오답</span></div>
    </div>
    <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  </div>

  <div id="score-banner" class="score-banner">
    <div class="score-big" id="sc-pct"></div>
    <div class="score-sub" id="sc-msg"></div>
    <button class="reset-btn" onclick="resetAll()">처음부터 다시 풀기</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="chapters"></div>
</div>

<script>
const Q=[
  {ch:"🧠 심리학의 기초",qs:[
    {q:"심리학의 정의로 가장 적절한 것은?",cs:["인간의 뇌 구조와 신경계를 연구하는 학문","인간의 행동과 정신 과정을 과학적으로 연구하여 삶의 질을 향상시키는 학문","사회 집단의 행동 패턴을 분석하는 학문","철학적 사유를 통해 인간 본성을 탐구하는 학문"],a:1,e:"심리학은 '행동'과 '정신 과정(마음)' 두 가지를 과학적으로 연구하는 학문입니다."},
    {q:"심리학이 과학으로서 갖춰야 할 3가지 조건을 모두 올바르게 묶은 것은?",cs:["관찰 가능, 측정 가능, 반복 가능","관찰 가능, 예측 가능, 통제 가능","측정 가능, 수정 가능, 적용 가능","반복 가능, 검증 가능, 수량화 가능"],a:0,e:"심리학의 과학적 조건: 관찰 가능(Observable) + 측정 가능(Measurable) + 반복 가능(Replicable)"},
    {q:"실험실 관찰법의 '단점'으로 가장 적절한 것은?",cs:["행동에 대한 예측이 어렵다","변수를 통제하기 어렵다","실생활 적용(생태학적 타당도)에 무리가 있다","반복 실험이 불가능하다"],a:2,e:"실험실은 인위적 환경이므로 실제 생활에 직접 적용하기 어려운 '생태학적 타당도' 문제가 발생합니다."},
    {q:"실험실 관찰법의 '장점'으로 가장 적절한 것은?",cs:["실생활에 즉시 적용 가능하다","자연 상태보다 행동 예측이 더 용이하다","비용이 거의 들지 않는다","피험자의 자연스러운 행동을 관찰할 수 있다"],a:1,e:"실험실에서는 변수를 통제하므로 자연 상태보다 행동 예측이 훨씬 쉽습니다."},
    {q:"비판적 사고의 특징으로 적절하지 않은 것은?",cs:["증거를 요구하고 주장의 가정·전제를 파악한다","개인적 일화를 그대로 신뢰한다","과잉 단순화와 과잉 일반화를 피한다","연구 증거를 다양한 관점에서 고려한다"],a:1,e:"비판적 사고는 개인적 일화에 의심을 갖는 것을 포함합니다. 일화를 그대로 신뢰하는 것은 비판적 사고에 반합니다."},
    {q:"심리학 연구자가 갖춰야 할 기본 자세는?",cs:["귀납적 사고","연역적 사고","비판적 사고","창의적 사고"],a:2,e:"비판적 사고: 어떤 현상이나 주장에 대해 '왜?'라고 묻고 근거를 탐색하는 태도입니다."},
  ]},
  {ch:"📚 학습의 기초",qs:[
    {q:"학습의 정의에 포함되지 않는 것은?",cs:["환경과의 상호작용을 통한 변화","비교적 일관성 있는 변화","약물에 의한 행동 변화","후천적으로 획득되는 능력"],a:2,e:"약물·신체 성장에 의한 변화, 감정·피로·질병으로 인한 일시적 변화는 학습에서 제외됩니다."},
    {q:"학습의 기본 원리인 '연합'의 정의로 옳은 것은?",cs:["두 가지 이상의 자극이 동시에 제거되는 현상","한 사건과 다른 사건의 연결","조건 반응이 소거되는 현상","유기체가 환경을 회피하는 과정"],a:1,e:"연합(Association)은 '한 사건과 다른 사건의 연결'로, 고전적·조작적 조건형성의 기본 원리입니다."},
    {q:"학습의 연합 형성 과정에 해당하지 않는 것은?",cs:["고전적 조건형성","조작적 조건형성","인지학습","본능적 반응"],a:3,e:"연합의 형성 과정은 고전적 조건형성, 조작적 조건형성, 인지학습 세 가지입니다. 본능적 반응은 선천적 행동입니다."},
  ]},
  {ch:"🔔 고전적 조건형성",qs:[
    {q:"고전적 조건형성에서 '무조건 자극(UCS)'이란?",cs:["학습을 통해 반응을 유발하게 된 자극","아무 반응도 일으키지 않는 자극","자동적 반사 반응을 일으키는 자극","조건 반응과 연합된 중성 자극"],a:2,e:"무조건 자극(UCS)은 학습 없이도 자동적으로 반사 반응을 일으키는 자극입니다. 예: 음식 → 침 분비"},
    {q:"파블로프 실험에서 학습 전 '종소리'는 무엇에 해당하는가?",cs:["무조건 자극(UCS)","조건 자극(CS)","중성 자극(NS)","조건 반응(CR)"],a:2,e:"학습 전 종소리는 개에게 아무런 반응을 일으키지 않는 '중성 자극(NS)'입니다. 음식과 반복 연합 후 '조건 자극(CS)'이 됩니다."},
    {q:"파블로프 실험에서 '조건 반응(CR)'이란?",cs:["음식을 보고 침을 흘리는 반응","종소리에 의해 학습된 침 분비 반응","아무 자극 없이 나타나는 자발적 반응","조건 자극을 회피하는 반응"],a:1,e:"조건 반응(CR)은 조건 자극(CS=종소리)에 의해 학습된 반응입니다. 무조건 반응(UCR)과 유사하나 강도가 약합니다."},
    {q:"고전적 조건형성에서 가장 효과적인 방법은?",cs:["역행 조건형성 — UCS 후 CS 제시","동시 조건형성 — CS와 UCS 동시 제시","지연 조건형성 — CS를 UCS보다 0.5초 앞서 제시","흔적 조건형성 — CS 제시 후 간격 두고 UCS 제시"],a:2,e:"지연 조건형성(CS를 UCS보다 약 0.5초 앞서 제시)이 가장 효과적인 조건형성 방법입니다."},
    {q:"'소거(Extinction)'에 대한 설명으로 옳은 것은?",cs:["CS와 UCS를 함께 제시하여 CR을 강화하는 현상","CS만 반복 제시하고 UCS를 제시하지 않을 때 CR이 점차 사라지는 현상","소거 후 일정 기간이 지나 CR이 다시 나타나는 현상","유사한 자극에도 CR이 나타나는 현상"],a:1,e:"소거는 CS만 반복 제시하고 UCS를 주지 않을 때 CR이 점차 약해져 사라지는 현상입니다."},
    {q:"'자발적 회복(Spontaneous Recovery)'이란?",cs:["소거 후 일정 기간 경과 뒤 CS 재제시 시 CR이 일시적으로 부활하는 현상","CS와 UCS를 다시 연합하여 CR을 회복하는 과정","처음보다 강한 CR이 형성되는 현상","중성 자극이 다시 조건 자극이 되는 과정"],a:0,e:"자발적 회복: 소거 후 일정 휴식기를 두고 CS를 다시 제시하면 CR이 일시적으로 되살아납니다."},
    {q:"'자극 일반화(Stimulus Generalization)'에 해당하는 예시는?",cs:["종소리에만 침을 흘리고 부저 소리에는 반응하지 않는 것","종소리와 유사한 다른 소리에도 침을 흘리는 것","음식 없이 종소리만으로도 반응이 사라지는 것","소거 후 자발적으로 반응이 다시 나타나는 것"],a:1,e:"자극 일반화: 조건화에 사용된 CS와 유사한 다른 자극에도 CR이 나타나는 현상입니다."},
    {q:"'자극 변별(Stimulus Discrimination)'을 가장 잘 설명하는 것은?",cs:["유사 자극 모두에 조건 반응을 보이는 것","조건 자극과 유사한 자극을 구분하여 특정 CS에만 반응하는 것","소거 후 반응이 회복되는 것","처음보다 더 강한 반응이 형성되는 것"],a:1,e:"자극 변별: 종소리와 부저 소리를 구분하여 종소리에만 CR을 보이는 것처럼, 유사 자극을 변별하여 반응하는 현상입니다."},
    {q:"고전적 조건형성에서 조건형성의 순서로 옳은 것은?",cs:["UCS→UCR / NS+UCS→CR / CS→CR","NS→CR / UCS→UCR / CS→CR","CS→UCR / NS→UCS / CR→CS","UCR→UCS / CR→CS / NS→UCR"],a:0,e:"① UCS→UCR(기본 반사) ② NS+UCS 반복 연합→CR 형성 ③ 이후 CS(구 NS)만으로 CR 유발"},
  ]},
  {ch:"⚙️ 조작적 조건형성",qs:[
    {q:"조작적 조건형성이 고전적 조건형성과 다른 점은?",cs:["자극과 반응의 연합이 없다","유기체가 수동적으로 반응한다","유기체의 자발적 행동과 그 결과가 연합된다","무조건 자극이 핵심 역할을 한다"],a:2,e:"조작적 조건형성은 유기체가 스스로 시작하는 '자발적 행동(조작행동)'과 그 결과의 연합으로 이후 행동이 결정됩니다."},
    {q:"스키너 상자 실험에서 '조성(Shaping)'이란?",cs:["원하는 행동을 강제로 시키는 것","원하는 행동을 점진적으로 유도하여 형성하는 과정","불필요한 행동을 처벌로 제거하는 것","자연 발생적 행동을 관찰하는 것"],a:1,e:"조성(Shaping): 목표 행동에 점차 가까워지는 행동에 강화를 주어 원하는 행동을 단계적으로 형성하는 방법입니다."},
    {q:"다음 중 '정적 강화(Positive Reinforcement)'에 해당하는 예시는?",cs:["숙제를 하면 TV 시청을 허락해준다","지각하면 벌점을 준다","두통이 있을 때 약을 먹어 두통이 사라진다","게임을 하면 게임기를 압수한다"],a:0,e:"정적 강화: 좋은 자극을 추가하여 행동을 증가시킵니다. 숙제→TV 허락은 원하는 보상을 추가한 것입니다."},
    {q:"'부적 강화(Negative Reinforcement)'의 올바른 예시는?",cs:["칭찬 스티커를 주어 수업 참여를 높인다","안전벨트를 매면 경고음이 꺼진다","나쁜 행동 시 용돈을 줄인다","결석하면 벌점을 부과한다"],a:1,e:"부적 강화: 싫은 자극(경고음)을 제거하여 행동(안전벨트 착용)을 증가시킵니다. '부적'은 제거를 의미합니다."},
    {q:"'정적 처벌(Positive Punishment)'에 해당하는 예시는?",cs:["게임기를 압수하여 게임을 못하게 한다","안전벨트 미착용 시 경고음이 울린다","원하는 행동을 하면 칭찬을 준다","숙제를 안 하면 TV를 못 보게 한다"],a:1,e:"정적 처벌: 싫은 자극(경고음)을 추가하여 행동을 감소시킵니다."},
    {q:"'부적 처벌(Negative Punishment)'에 해당하는 예시는?",cs:["잘못된 행동을 하면 체벌을 가한다","공부를 잘하면 칭찬 스티커를 준다","게임을 너무 많이 하면 게임기를 압수한다","약을 먹으면 두통이 사라진다"],a:2,e:"부적 처벌: 좋은 자극(게임기)을 제거하여 행동(과도한 게임)을 감소시킵니다."},
    {q:"강화와 처벌을 올바르게 설명한 것은?",cs:["강화는 행동을 감소시키고, 처벌은 행동을 증가시킨다","강화는 행동을 증가시키고, 처벌은 행동을 감소시킨다","정적은 자극의 제거를 의미하고, 부적은 추가를 의미한다","강화와 처벌 모두 행동의 빈도를 증가시킨다"],a:1,e:"강화(Reinforcement)=행동 증가 / 처벌(Punishment)=행동 감소. 정적(+)=자극 추가, 부적(-)=자극 제거."},
    {q:"조작적 조건형성에서 학습 효과가 가장 뛰어난 방법은?",cs:["부적 처벌","정적 처벌","정적 강화","부적 강화"],a:2,e:"정적 강화(좋은 자극 추가)가 4가지 강화·처벌 유형 중 학습 효과가 가장 뛰어납니다."},
    {q:"조작적 조건형성에서 '강화물(Reinforcer)'의 정의는?",cs:["행동의 빈도나 강도를 감소시키는 자극","행동의 빈도나 강도를 증가시키는 자극","조건 반응을 소거시키는 자극","유기체에게 아무런 영향을 미치지 않는 자극"],a:1,e:"강화물은 어떤 행동 다음에 제시되어 그 행동의 빈도나 강도를 증가시키는 자극입니다."},
  ]},
  {ch:"💬 언어심리학",qs:[
    {q:"언어에서 '음소(Phoneme)'란?",cs:["의미를 가진 가장 작은 언어 단위","언어에서 의미를 구분하는 가장 작은 소리 단위","단어들의 배열 규칙","문장의 의미를 전달하는 단위"],a:1,e:"음소(Phoneme): 의미를 구분하는 가장 작은 소리 단위. 예: /ㄱ/과 /ㄴ/은 다른 음소로 '가'와 '나'를 구분."},
    {q:"'형태소(Morpheme)'에 대한 설명으로 옳은 것은?",cs:["가장 작은 소리의 단위","문장을 구성하는 규칙","의미를 가진 가장 작은 언어 단위","단어와 단어 사이의 관계"],a:2,e:"형태소(Morpheme): 의미를 가진 가장 작은 단위. 예: '먹었다' = '먹-'(어근) + '-었-'(과거) + '-다'(종결)"},
    {q:"언어 발달을 '모방과 강화'로 설명한 학자는?",cs:["촘스키 (Chomsky)","피아제 (Piaget)","스키너 (Skinner)","가드너 (Gardner)"],a:2,e:"스키너: 아이들이 부모의 말을 모방하고 칭찬(강화)을 받으면서 언어를 학습한다고 봤습니다."},
    {q:"촘스키(Chomsky)의 언어 발달 이론에서 핵심 개념은?",cs:["모방과 강화","인지 발달 단계","언어습득장치(LAD)와 보편문법","사회적 상호작용"],a:2,e:"촘스키: 인간은 선천적으로 언어습득장치(LAD)와 보편문법을 갖고 태어나며, 언어는 타고난 능력이라고 주장했습니다."},
    {q:"스키너와 촘스키의 언어 발달 이론을 비교한 것으로 옳은 것은?",cs:["스키너=선천적, 촘스키=후천적","스키너=후천적(학습), 촘스키=선천적(본능)","둘 다 환경의 영향을 강조한다","둘 다 생물학적 기제를 강조한다"],a:1,e:"스키너(행동주의): 언어는 모방+강화로 학습됨(후천적) / 촘스키(생성문법): 언어는 LAD로 선천적으로 습득됨."},
    {q:"언어의 기능으로 옳지 않은 것은?",cs:["주변 현상을 이해하고 개념화하는 인지 도구","생각과 감정을 표현·전달하는 의사소통 도구","기억을 장기적으로 저장하는 생물학적 장치","사고 과정에 사용되는 도구"],a:2,e:"언어의 기능은 ① 인지 도구(개념화) ② 의사소통 도구입니다. '기억의 생물학적 저장 장치'는 언어의 기능이 아닙니다."},
    {q:"'개념'에 대한 설명으로 옳은 것은?",cs:["단순한 감각 경험의 총합","위계적 또는 연결망 구조의 범주에 속해 있음","언어와 무관한 순수 인지 과정","반복 학습으로만 형성되는 정보"],a:1,e:"개념은 위계적·연결망 구조로 구성됩니다. 예: '새'는 동물의 하위, 참새·펭귄의 상위 범주."},
    {q:"의사결정(Decision Making)의 정의로 옳은 것은?",cs:["문제를 분석하여 원인을 파악하는 과정","여러 대안 중 하나를 선택하는 과정","주어진 정보를 기억하는 과정","감정에 따라 행동을 조절하는 과정"],a:1,e:"의사결정: 여러 가지 대안 중 하나를 선택하는 과정. 예: 냉장고 구매 시 가격·크기·색상 등을 비교 후 선택."},
  ]},
  {ch:"🧩 지능 이론",qs:[
    {q:"지능의 정의로 가장 포괄적인 것은?",cs:["IQ 검사로 측정되는 수치","수리·언어 능력의 합산 점수","추상적 사고, 낯선 환경 적응, 합리적 사고로 환경을 활용하는 능력","암기력과 집중력의 총합"],a:2,e:"지능의 정의: 추상적 사고 + 낯선 환경 적응 + 목적을 가진 합리적 사고로 환경을 활용하는 능력."},
    {q:"가드너(Gardner)의 '다중지능이론'에서 지능의 특징은?",cs:["지능은 하나의 단일한 일반 요인(g)으로 구성된다","지능은 분석·창의·실용의 세 유형으로 나뉜다","지능은 다양하고 특수한 여러 가지 지능들을 포함한다","지능은 경험과 유전의 합산으로 결정된다"],a:2,e:"가드너의 다중지능이론: 지능은 단일하지 않고 언어·음악·논리수리·공간·신체운동·대인관계·개인이해 등 다양한 지능으로 구성됩니다."},
    {q:"가드너의 다중지능에 해당하지 않는 것은?",cs:["음악적 지능","대인관계적 지능","논리수리적 지능","감정조절 지능"],a:3,e:"가드너의 7가지 지능: 언어·음악·논리수리·공간·신체운동·대인관계·개인이해(자기성찰). '감정조절 지능'은 포함되지 않습니다."},
    {q:"스턴버그(Sternberg)의 '삼원지능이론'에서 3가지 지능이 바르게 연결된 것은?",cs:["성분지능-경험지능-맥락지능","언어지능-수리지능-공간지능","분석지능-창의지능-도덕지능","결정성지능-유동성지능-정서지능"],a:0,e:"스턴버그의 삼원지능: 성분지능(분석·일반 IQ검사) + 경험지능(창의·문제해결) + 맥락지능(실용·상식·삶의 지혜)"},
    {q:"스턴버그의 삼원지능 중 '맥락지능'을 가장 잘 설명한 것은?",cs:["일반 지능검사에서 측정되는 분석 능력","창조적 사고와 새로운 문제 해결 능력","실용 지능, 상식, 삶의 지혜","언어와 수리 능력의 조합"],a:2,e:"맥락지능(실용지능): 일상 환경에 적응하고 활용하는 능력 — 상식·삶의 지혜가 해당됩니다."},
    {q:"'결정성 지능(Crystallized Intelligence)'에 대한 설명으로 옳은 것은?",cs:["선천적으로 타고나는 추론 능력으로 나이가 들수록 감소한다","경험과 교육을 통해 형성되며 나이가 들수록 증가한다","감정을 인식하고 조절하는 능력이다","공간·수리 추론과 관련된 단기 능력이다"],a:1,e:"결정성 지능: 경험과 교육으로 형성되어 나이가 들어도 유지·증가함. 유동성 지능은 선천적·나이↓."},
    {q:"'정서 지능(Emotional Intelligence)'의 핵심 능력이 아닌 것은?",cs:["자신의 정서를 점검하는 능력","타인의 정서를 변별하는 능력","정서를 활용해 사고·행동을 이끄는 능력","IQ 검사에서 높은 점수를 받는 능력"],a:3,e:"정서지능(EQ)은 ① 자신·타인 정서 인식 ② 정서 변별 ③ 정서를 사고·행동에 활용하는 능력입니다. IQ와는 다릅니다."},
    {q:"'모든 지적 과제의 기저에 공통적인 일반 지능(g요인)이 존재한다'는 이론은?",cs:["다중지능이론","삼원지능이론","일반요인이론 (스피어만)","정서지능이론"],a:2,e:"스피어만의 일반요인이론(g요인): 모든 지능 검사 수행의 기저에 공통적인 일반 지능(g)이 있다고 주장했습니다."},
  ]},
  {ch:"👶 발달심리학",qs:[
    {q:"발달심리학의 연구 대상으로 옳은 것은?",cs:["아동기의 인지 발달만을 연구","인간의 전 생애에 걸친 신체·인지·정서의 변화","노인의 신체적 쇠퇴 현상만을 연구","청소년기의 정서 변화만을 연구"],a:1,e:"발달심리학은 출생부터 사망까지 인간의 전 생애에 걸친 신체·인지·정서의 변화를 연구합니다."},
    {q:"피아제의 인지발달 4단계를 순서대로 옳게 나열한 것은?",cs:["감각운동기→전조작기→구체적조작기→형식적조작기","전조작기→감각운동기→형식적조작기→구체적조작기","구체적조작기→전조작기→감각운동기→형식적조작기","감각운동기→구체적조작기→전조작기→형식적조작기"],a:0,e:"피아제의 4단계: ①감각운동기(0~2세) → ②전조작기(2~7세) → ③구체적조작기(7~11세) → ④형식적조작기(12세~)"},
    {q:"피아제의 '감각운동기(0~2세)'의 주요 발달 과업은?",cs:["보존 개념의 획득","연역적 추론의 발달","대상 영속성의 획득","자기중심적 사고의 극복"],a:2,e:"감각운동기(0~2세): 감각 경험으로 세상 탐색, '대상 영속성(눈에 안 보여도 사물은 존재한다)'의 획득이 핵심 과업."},
    {q:"피아제의 '전조작기(2~7세)'의 특징으로 옳은 것은?",cs:["대상 영속성을 획득하는 시기","자기중심적 사고와 보존 개념의 결여가 특징","추상적 가설을 세우고 논리적 추론이 가능","수와 양의 보존 개념을 이해하는 시기"],a:1,e:"전조작기: 언어·기호 사용 가능, 상징적 사고 발달. 그러나 '자기중심적 사고'와 '보존 개념 결여'가 주요 특징."},
    {q:"피아제의 '구체적 조작기(7~11세)'에서 발달하는 능력은?",cs:["대상 영속성","추상적 가설 추론","수와 양의 보존 개념 이해와 가역성 인식","자기중심적 사고"],a:2,e:"구체적 조작기: 수·양의 보존 개념 이해, 가역성(조작을 반대로 되돌릴 수 있음) 인식. 단, 추상적 추론은 불가."},
    {q:"피아제의 '형식적 조작기(12세~)'에서 가능한 사고는?",cs:["보존 개념 획득","자기중심적 사고","구체적 사물에 한한 논리적 사고","추상적 가설 설정과 연역적 추론"],a:3,e:"형식적 조작기: 추상적 상황에서 가설 설정·연역적 추론 가능. 사고의 완성 단계."},
    {q:"'대상 영속성(Object Permanence)'을 획득하는 시기는?",cs:["전조작기","감각운동기","구체적 조작기","형식적 조작기"],a:1,e:"대상 영속성(눈에 안 보여도 사물은 존재함)은 감각운동기(0~2세)의 핵심 발달 과업입니다."},
    {q:"애착(Attachment)의 정의로 가장 적절한 것은?",cs:["유아가 또래와 형성하는 경쟁 관계","유아와 양육자 간의 정서적 유대 관계","유아의 인지 발달 수준을 평가하는 기준","부모가 자녀에게 갖는 일방적인 감정"],a:1,e:"애착: 유아와 양육자 간에 형성되는 정서적 유대 관계로 정서적·사회적 발달의 토대가 됩니다."},
    {q:"할로우(Harlow)의 원숭이 실험에서 밝혀진 사실은?",cs:["애착은 주로 먹이 제공을 통해 형성된다","애착 형성에는 신체적 접촉(접촉 위안)이 핵심이다","원숭이는 음식을 주는 철사 어미를 더 선호했다","애착은 출생 직후부터 형성이 불가능하다"],a:1,e:"할로우 실험: 새끼 원숭이는 먹이를 주는 철사 어미보다 부드러운 천 어미(접촉 위안)를 훨씬 선호 → 애착 = 접촉."},
    {q:"에인스워스의 '안전 애착(Secure Attachment)'의 특징은?",cs:["양육자와 분리 시 무관심, 재결합 시에도 회피","양육자와 분리 시 스트레스 경험, 재결합 시 빠른 안정","양육자와 분리 후 극심한 불안, 재결합 후에도 진정 어려움","양육자에 대해 일관성 없이 혼란스러운 반응"],a:1,e:"안전 애착: 분리 시 스트레스를 경험하지만, 재결합 시 양육자에게 위안을 받고 빠르게 안정됩니다."},
    {q:"에인스워스의 '회피 애착(Avoidant Attachment)'의 특징은?",cs:["분리·재결합 모두에서 무관심하고 양육자를 회피","분리 시 극심한 불안을 보임","재결합 시 빠르게 진정됨","양육자에 대한 반응이 일관되지 않음"],a:0,e:"회피 애착: 양육자와의 분리·재결합 모두에서 무관심하며 양육자를 회피하는 반응을 보입니다."},
    {q:"피아제의 도덕 발달 단계를 순서대로 옳게 나열한 것은?",cs:["타율적 도덕성→전 도덕성→자율적 도덕성","전 도덕성→타율적 도덕성→자율적 도덕성","자율적 도덕성→전 도덕성→타율적 도덕성","전 도덕성→자율적 도덕성→타율적 도덕성"],a:1,e:"피아제의 도덕 발달: ①전 도덕성 → ②타율적 도덕성(결과·절대 권위 중심) → ③자율적 도덕성(의도·사회합의)"},
    {q:"콜버그의 도덕 발달 '인습적 수준'의 특징은?",cs:["행동의 결과(보상·처벌)가 도덕 판단의 근거","보편적 윤리 원칙이 도덕 판단의 근거","타인의 기대와 사회 규범 충족이 도덕 판단의 근거","자기 이익 극대화가 도덕 판단의 근거"],a:2,e:"콜버그 인습적 수준: 타인의 요구·기대와 사회 규범·법률에 부합하는 것이 도덕적 행동의 기준입니다."},
    {q:"콜버그의 '후 인습적 수준'의 도덕 판단 기준은?",cs:["처벌 회피","사회적 기대 충족","보편적 윤리 원칙","권위자의 명령 복종"],a:2,e:"후 인습적 수준: 법이나 사회 규범을 넘어서는 보편적 윤리 원칙(생명 존중, 정의 등)이 도덕 판단의 기준."},
    {q:"피아제의 '타율적 도덕성'의 특징은?",cs:["규칙은 사회 합의로 만들어지며 바뀔 수 있다고 인식","규칙은 절대 권위자가 만들며 어기면 반드시 벌 받는다고 믿음","결과보다 의도를 중심으로 도덕 판단","옳고 그름을 일관성 있게 판단하지 못함"],a:1,e:"타율적 도덕성: 규칙 = 절대 권위자 제정, 위반 = 반드시 처벌. 결과 중심적 판단이 특징입니다."},
    {q:"피아제의 '자율적 도덕성'의 특징으로 옳은 것은?",cs:["규칙을 어기면 반드시 처벌받는다고 믿음","결과만을 중심으로 도덕 판단","사회적 합의로 규칙이 정해지며 상황에 따라 바뀔 수 있음을 이해","옳고 그름을 전혀 구분하지 못함"],a:2,e:"자율적 도덕성: 규칙은 사회적 합의로 정해지며, 상황에 따라 바뀔 수 있다는 것을 이해. 의도 중심적 판단."},
  ]},
  {ch:"❤️ 동기 이론",qs:[
    {q:"동기(Motivation)의 어원과 의미로 옳은 것은?",cs:["그리스어 'logos(이성)'에서 파생 — 이성적 판단","라틴어 'motus(움직이다)'에서 파생 — 행동을 움직이게 하는 힘","프랑스어 'motif(이유)'에서 파생 — 행동의 이유","독일어 'Motiv(주제)'에서 파생 — 행동의 주제"],a:1,e:"동기(Motivation)의 어원: 라틴어 'motus(움직이다)'에서 파생. 무엇을 움직이게 하는 근원적 힘."},
    {q:"동기의 3가지 구성 요소를 순서대로 옳게 나열한 것은?",cs:["지속성→강도→활성화","강도→활성화→지속성","활성화→강도→지속성","활성화→지속성→강도"],a:2,e:"동기의 3요소: 활성화(행동 시작) → 강도(행동의 세기·방향) → 지속성(행동 유지)."},
    {q:"'내적 동기(Intrinsic Motivation)'에 해당하는 것은?",cs:["돈을 받기 위해 일한다","학점을 높이기 위해 공부한다","순수한 호기심과 흥미로 탐구한다","타인의 인정을 받기 위해 노력한다"],a:2,e:"내적 동기: 호기심·흥미·도전·의지 등 내부에서 자발적으로 일어나는 동기. 외적 보상과 무관합니다."},
    {q:"외적 동기와 내적 동기를 비교한 것으로 옳은 것은?",cs:["외적 동기가 내적 동기보다 성취 동기와 지속성이 높다","내적 동기가 외적 동기보다 성취 동기와 지속성이 높다","두 동기는 성취 효과에서 차이가 없다","외적 동기는 행동을 전혀 이끌어내지 못한다"],a:1,e:"내적 동기 > 외적 동기: 내적 동기는 성취 동기가 높고 행동이 지속적. 외적 동기(보상)는 상대적으로 지속성이 약합니다."},
    {q:"매슬로우(Maslow) 욕구 위계의 가장 하위 단계는?",cs:["안전과 안정의 욕구","소속감과 애정의 욕구","생리적 욕구","자아실현의 욕구"],a:2,e:"매슬로우 욕구 위계 최하위: 생리적 욕구(음식·수면·호흡 등 생존). 가장 먼저 충족되어야 합니다."},
    {q:"매슬로우 욕구 위계에서 '자아실현의 욕구'는 몇 번째 단계인가?",cs:["2단계","3단계","4단계","5단계"],a:3,e:"매슬로우 5단계: 생리→안전→소속·애정→인정·존중→자아실현. 자아실현은 최상위 5단계입니다."},
    {q:"매슬로우 이론에서 욕구 충족의 원칙은?",cs:["상위 욕구부터 충족해야 한다","하위 욕구가 충족되어야 상위 욕구를 추구한다","모든 욕구는 동시에 충족될 수 있다","욕구 사이에는 위계가 없다"],a:1,e:"매슬로우: 하위 욕구(생존·안전)가 먼저 충족되어야 상위 욕구(소속·존중·자아실현)를 추구하게 됩니다."},
    {q:"매슬로우 욕구 5단계를 순서대로 옳게 나열한 것은?",cs:["생리→안전→소속·애정→인정·존중→자아실현","안전→생리→소속·애정→인정·존중→자아실현","생리→소속·애정→안전→인정·존중→자아실현","인정·존중→소속·애정→안전→생리→자아실현"],a:0,e:"매슬로우 5단계: ①생리적 욕구 → ②안전·안정 → ③소속감·애정 → ④인정·존중·존경 → ⑤자아실현"},
  ]},
  {ch:"😊 정서 이론",qs:[
    {q:"정서의 개념으로 가장 포괄적인 것은?",cs:["단순한 기분 상태","얼굴 표정·신체 변화·인지적 평가·주관적 느낌을 포함하는 복잡한 감정 상태","생리적 각성 반응만을 의미하는 것","외부 자극에 대한 단순 반사"],a:1,e:"정서: 얼굴 표정, 신체 변화, 인지적 평가, 주관적 느낌을 포함하는 다양하고 복잡한 감정 상태."},
    {q:"'제임스-랑게 이론'의 정서 발생 순서는?",cs:["자극→정서→생리적 각성","자극→생리적 각성→정서 지각","자극→인지 평가→생리적 각성→정서","자극→생리적 각성+정서 지각(동시)"],a:1,e:"제임스-랑게: 자극 → 신체(생리)가 먼저 반응 → 그 신체 반응을 인식하여 정서 경험. '우리가 울어서 슬프다.'"},
    {q:"'캐논-바드 이론'이 제임스-랑게 이론과 다른 점은?",cs:["인지 평가를 정서의 주요 요인으로 본다","생리적 각성과 정서 지각이 동시에 발생한다고 본다","신체 반응이 정서보다 먼저 발생한다고 본다","정서는 학습을 통해서만 형성된다고 본다"],a:1,e:"캐논-바드: 자극 → 생리적 각성과 정서 지각이 동시에 발생. 뇌(시상)에서 두 반응이 동시에 시작됩니다."},
    {q:"'샥터-싱어 이론'의 핵심 주장은?",cs:["신체 반응이 정서보다 먼저 발생한다","생리적 각성과 정서가 동시에 일어난다","생리적 각성 후 상황에 대한 인지 평가가 정서를 결정한다","인지 평가가 생리적 각성보다 먼저 일어난다"],a:2,e:"샥터-싱어: 자극 → 생리적 각성 → 상황을 인지적으로 평가 → 정서를 명명(이름 붙임). 2요인 이론이라고도 함."},
    {q:"'라자러스 이론'이 다른 정서 이론과 구별되는 핵심은?",cs:["신체 반응이 가장 먼저 일어난다","인지 평가(Cognitive Appraisal)가 생리적 각성에 선행한다","생리적 각성과 정서 지각이 동시에 발생한다","정서는 생리적 반응의 부산물이다"],a:1,e:"라자러스: 자극 → 인지 평가(먼저!) → 생리적 각성 + 정서 지각. 상황 해석(인지)이 정서를 결정한다고 봤습니다."},
    {q:"동일한 생리적 각성이라도 상황 해석에 따라 다른 정서를 경험한다는 이론은?",cs:["제임스-랑게 이론","캐논-바드 이론","샥터-싱어 이론","라자러스 이론"],a:2,e:"샥터-싱어의 핵심: 동일한 생리적 각성(심장 빠름)도 상황에 따라 '공포' 또는 '설렘'으로 명명됩니다."},
    {q:"4가지 정서 이론 중 '인지 평가가 가장 먼저' 일어난다고 보는 이론은?",cs:["제임스-랑게 이론","캐논-바드 이론","샥터-싱어 이론","라자러스 이론"],a:3,e:"라자러스 이론만이 인지 평가가 생리적 각성보다 먼저 일어난다고 주장합니다."},
  ]},
];

const LBL=['①','②','③','④'];
const TOTAL=Q.reduce((s,c)=>s+c.qs.length,0);
let st={},done=0,cor=0,wro=0;

function upd(){
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-cor').textContent=cor;
  document.getElementById('s-wro').textContent=wro;
  document.getElementById('prog').style.width=Math.round(done/TOTAL*100)+'%';
  if(done===TOTAL){
    const pct=Math.round(cor/TOTAL*100);
    document.getElementById('sc-pct').textContent=pct+'점';
    const msgs=[[90,'완벽해요! 시험 걱정 없겠어요!'],[70,'잘 하셨어요! 틀린 문제만 복습하면 완벽!'],[50,'절반 이상! 조금 더 복습해봐요.'],[0,'다시 한 번 도전해봐요! 할 수 있어요!']];
    document.getElementById('sc-msg').textContent=msgs.find(([t])=>pct>=t)[1];
    document.getElementById('score-banner').classList.add('on');
  }
}

function pick(ci,qi,sel){
  const k=ci+'-'+qi;
  if(st[k]!==undefined)return;
  st[k]=sel;
  done++;
  if(sel===Q[ci].qs[qi].a)cor++;else wro++;
  upd();
  render(ci,qi);
}

function render(ci,qi){
  const k=ci+'-'+qi;
  const card=document.getElementById('c-'+k);
  if(!card)return;
  const q=Q[ci].qs[qi];
  const picked=st[k];
  const ans=picked!==undefined;
  card.querySelectorAll('.choice').forEach((el,i)=>{
    el.classList.remove('correct','wrong','dim');
    if(ans){
      if(i===q.a)el.classList.add('correct');
      else if(i===picked)el.classList.add('wrong');
      else el.classList.add('dim');
      el.style.cursor='default';
    }
  });
  const ex=card.querySelector('.explain');
  if(ex)ex.style.display=ans?'block':'none';
  card.classList.toggle('answered',ans);
}

function switchTab(ci){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.chap-wrap').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+ci).classList.add('active');
  document.getElementById('ch-'+ci).classList.add('active');
}

function build(){
  const tabsEl=document.getElementById('tabs');
  const chapEl=document.getElementById('chapters');
  tabsEl.innerHTML='';chapEl.innerHTML='';
  let gn=0;
  Q.forEach((ch,ci)=>{
    const tb=document.createElement('button');
    tb.className='tab'+(ci===0?' active':'');
    tb.textContent=ch.ch;
    tb.id='tab-'+ci;
    tb.onclick=()=>switchTab(ci);
    tabsEl.appendChild(tb);

    const wrap=document.createElement('div');
    wrap.className='chap-wrap'+(ci===0?' active':'');
    wrap.id='ch-'+ci;
    const lbl=document.createElement('div');
    lbl.className='ch-label';
    lbl.textContent=ch.ch+' — '+ch.qs.length+'문항';
    wrap.appendChild(lbl);

    ch.qs.forEach((q,qi)=>{
      gn++;
      const card=document.createElement('div');
      card.className='q-card';
      card.id='c-'+ci+'-'+qi;
      const choicesHTML=q.cs.map((c,i)=>
        `<div class="choice" ontouchstart="" onclick="pick(${ci},${qi},${i})">
          <span class="c-lbl">${LBL[i]}</span>
          <span class="c-txt">${c}</span>
        </div>`).join('');
      card.innerHTML=`
        <div class="q-top">
          <span class="q-badge">Q${gn}</span>
          <span class="q-text">${q.q}</span>
        </div>
        <div class="choices">${choicesHTML}</div>
        <div class="explain"><b>정답 ${LBL[q.a]}</b> &nbsp;${q.e}</div>`;
      wrap.appendChild(card);
    });
    chapEl.appendChild(wrap);
  });
}

function resetAll(){
  st={};done=0;cor=0;wro=0;
  document.getElementById('score-banner').classList.remove('on');
  upd();build();
  window.scrollTo(0,0);
}

build();upd();
</script>
